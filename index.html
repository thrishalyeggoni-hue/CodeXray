    <script>
      window.addEventListener('error', function (e) {
        if (e && e.message && (e.message.indexOf('ResizeObserver') !== -1 || e.message.indexOf('Script error') !== -1)) {
          e.stopImmediatePropagation();
          e.stopPropagation();
          e.preventDefault();
          return false;
        }
      }, true);
    </script>
